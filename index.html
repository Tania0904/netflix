<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Netflix Clone</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>

<body>

    <!-- HEADER -->
    <header>
        <div class="left-header">
            <img src="https://help.nflxext.com/helpcenter/OneTrust/oneTrust_production_2026-01-09/consent/87b6a5c0-0104-4e96-a291-092c11350111/019ae4b5-d8fb-7693-90ba-7a61d24a8837/logos/dd6b162f-1a32-456a-9cfe-897231c7763c/4345ea78-053c-46d2-b11e-09adaef973dc/Netflix_Logo_PMS.png"
                alt="Netflix Logo">

            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Shows</a></li>
                <li><a href="#">Movies</a></li>
                <li><a href="#">New & Popular</a></li>
                <li><a href="#">My List</a></li>
            </ul>
        </div>

        <div class="right-header">
            <a href="#"><i class="fa fa-search"></i></a>
            <a href="#"><i class="fa fa-bell-o"></i></a>
        </div>
    </header>


    <!-- HERO SECTION -->
    <section class="hero">
        <div class="main-hero">


            <video class="bg-video" autoplay muted loop playsinline>
    <source src="https://www.w3schools.com/howto/rain.mp4" type="video/mp4">
</video>

            <!-- Content -->
            <div class="upper-hero">
                <h1>Stranger Things</h1>
                <p>
                    When a young boy vanishes, a small town uncovers a mystery 
                    involving secret experiments and supernatural forces.
                </p>

                <div>
                    <button class="btn primary-btn">
                        <i class="fa fa-play"></i> Play
                    </button>

                    <button class="btn info-btn">
                        <i class="fa fa-info-circle"></i> More Info
                    </button>
                </div>
            </div>

        </div>
    </section>
            <section class="scroll-section">
<h1>MY list</h1>
<div class="scroll-mian">
  <div class="box1"></div>
  <div class="box2"></div>
  <div class="box3"></div>
  <div class="box4"></div>
  <div class="box5"></div>
  <div class="box6"></div>
  <div class="box7"></div>
  <div class="box8"></div>
  <div class="box9"></div>
  <div class="box10"></div>
</div>
</section>


</body>
</html>
